<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niwa Pilates</title>
<meta name="description" content="Studio Niwa Pilates em Mogi das Cruzes - SP. Mais de 12 anos de experiência aplicando o Pilates Clínico Contemporâneo. Menos dores, mais qualidade de vida.">
<link rel="icon" href="img17.webp" type="image/webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="site-header" id="topo">
  <div class="container header-inner">
    <a href="#topo" class="logo"><img src="LOGO-OFICIAL-NIWA-PILATES.svg" alt="Niwa Pilates"></a>
  </div>
</header>

<!-- ===== EM CONSTRUÇÃO ===== -->
<section class="construcao" id="em-construcao">
  <div class="construcao-bg"></div>
  <div class="construcao-inner">
    <h2 class="construcao-title">Em construção</h2>
    <p class="construcao-sub">Em breve um novo site para você!</p>

    <div class="carousel" id="carousel">
      <div class="carousel-viewport">
        <div class="carousel-track" id="carouselTrack">
          <div class="carousel-slide"><img src="em_construcao1.webp" alt="Studio Niwa Pilates" loading="lazy"></div>
          <div class="carousel-slide"><img src="em_construcao2.webp" alt="Studio Niwa Pilates" loading="lazy"></div>
          <div class="carousel-slide"><img src="em_construcao3.webp" alt="Studio Niwa Pilates" loading="lazy"></div>
          <div class="carousel-slide"><img src="em_construcao4.webp" alt="Niwa Pilates" loading="lazy"></div>
        </div>
      </div>
      <button class="carousel-btn prev" id="prevBtn" aria-label="Imagem anterior">&#8249;</button>
      <button class="carousel-btn next" id="nextBtn" aria-label="Próxima imagem">&#8250;</button>
      <div class="carousel-dots" id="carouselDots"></div>
    </div>
  </div>
</section>



<!-- ===== WHATSAPP FLUTUANTE ===== -->
<a href="https://api.whatsapp.com/send?phone=5511967002491" class="whatsapp-float" target="_blank" rel="noopener" aria-label="WhatsApp">

</a>

<script>
  // Menu mobile
  document.getElementById('navToggle').addEventListener('click', function () {
    document.getElementById('nav').classList.toggle('open');
    this.classList.toggle('active');
  });
  document.querySelectorAll('#nav a').forEach(function (a) {
    a.addEventListener('click', function () {
      document.getElementById('nav').classList.remove('open');
      document.getElementById('navToggle').classList.remove('active');
    });
  });

  // Carrossel "Em construção"
  (function () {
    var track = document.getElementById('carouselTrack');
    var slides = track ? track.children : [];
    var total = slides.length;
    if (!total) return;
    var dotsWrap = document.getElementById('carouselDots');
    var index = 0, timer;

    for (var i = 0; i < total; i++) {
      var d = document.createElement('button');
      d.className = 'carousel-dot';
      d.setAttribute('aria-label', 'Ir para imagem ' + (i + 1));
      d.dataset.i = i;
      dotsWrap.appendChild(d);
    }
    var dots = dotsWrap.children;

    function go(n) {
      index = (n + total) % total;
      track.style.transform = 'translateX(' + (-index * 100) + '%)';
      for (var i = 0; i < total; i++) dots[i].classList.toggle('active', i === index);
    }
    function next() { go(index + 1); }
    function prev() { go(index - 1); }
    function restart() { clearInterval(timer); timer = setInterval(next, 4500); }

    document.getElementById('nextBtn').addEventListener('click', function () { next(); restart(); });
    document.getElementById('prevBtn').addEventListener('click', function () { prev(); restart(); });
    dotsWrap.addEventListener('click', function (e) {
      if (e.target.classList.contains('carousel-dot')) { go(+e.target.dataset.i); restart(); }
    });

    go(0);
    restart();
  })();

  // Formulário -> WhatsApp
  document.getElementById('contactForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var f = e.target;
    var msg = 'Olá! Gostaria de mais informações.%0A'
      + '*Nome:* ' + encodeURIComponent(f.nome.value) + '%0A'
      + '*E-mail:* ' + encodeURIComponent(f.email.value) + '%0A'
      + '*Telefone:* ' + encodeURIComponent(f.telefone.value || '-') + '%0A'
      + '*Contato por:* ' + encodeURIComponent((f.canal.value) || '-') + '%0A'
      + '*Assunto:* ' + encodeURIComponent(f.assunto.value);
    window.open('https://api.whatsapp.com/send?phone=5511967002491&text=' + msg, '_blank');
  });
</script>
</body>
</html>
